name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependabot-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  metadata:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    outputs:
      update-type: ${{ steps.meta.outputs.update-type }}
      dependency-names: ${{ steps.meta.outputs.dependency-names }}
      package-ecosystem: ${{ steps.meta.outputs.package-ecosystem }}
    steps:
      - name: Fetch dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major version updates outside GitHub Actions
        if: steps.meta.outputs.update-type == 'version-update:semver-major' && steps.meta.outputs.package-ecosystem != 'github_actions'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr comment "$PR_URL" \
            --body "> [!WARNING]
          > **Major version update** for \`${{ steps.meta.outputs.dependency-names }}\` — skipped auto-merge. Please review for breaking changes before merging manually." \
            || true

  rust:
    runs-on: ubuntu-latest
    needs: metadata
    if: github.event.pull_request.user.login == 'dependabot[bot]' && !(needs.metadata.outputs.update-type == 'version-update:semver-major' && needs.metadata.outputs.package-ecosystem != 'github_actions')
    steps:
      - name: Check out PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Build
        run: cargo check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-targets

  e2e:
    runs-on: ubuntu-latest
    needs: metadata
    if: github.event.pull_request.user.login == 'dependabot[bot]' && !(needs.metadata.outputs.update-type == 'version-update:semver-major' && needs.metadata.outputs.package-ecosystem != 'github_actions')
    steps:
      - name: Check out PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Start Qdrant
        run: |
          docker run -d --name shiori-qdrant-e2e \
            -p 6335:6335 \
            -e QDRANT__SERVICE__HTTP_PORT=6335 \
            -e QDRANT__SERVICE__GRPC_PORT=6336 \
            qdrant/qdrant
          until curl -fsS "http://127.0.0.1:6335/collections" >/dev/null; do
            sleep 1
          done

      - name: Run end-to-end test
        run: QDRANT_URL="http://127.0.0.1:6335" cargo test --test e2e end_to_end_search_flow -- --ignored --nocapture

  merge:
    runs-on: ubuntu-latest
    needs: [metadata, rust, e2e]
    if: github.event.pull_request.user.login == 'dependabot[bot]' && !(needs.metadata.outputs.update-type == 'version-update:semver-major' && needs.metadata.outputs.package-ecosystem != 'github_actions')
    steps:
      - name: Merge Dependabot PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          gh pr review --approve "$PR_URL" || true

          files=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json files --jq '.files[].path')
          if printf '%s\n' "$files" | grep -q '^.github/workflows/'; then
            base_branch=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json baseRefName --jq '.baseRefName')

            git init repo
            cd repo
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
            git fetch --depth=1 origin "$base_branch"
            git checkout -b "$base_branch" FETCH_HEAD
            git fetch --depth=1 origin "pull/${PR_NUMBER}/head"
            git merge --no-ff --no-edit FETCH_HEAD
            git push origin HEAD:"$base_branch"
            exit 0
          fi

          gh pr merge --rebase "$PR_URL"
