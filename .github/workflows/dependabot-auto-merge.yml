name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependabot-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  metadata:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    outputs:
      update-type: ${{ steps.meta.outputs.update-type }}
      dependency-names: ${{ steps.meta.outputs.dependency-names }}
    steps:
      - name: Fetch dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major version updates
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr comment "$PR_URL" \
            --body "> [!WARNING]
          > **Major version update** for \`${{ steps.meta.outputs.dependency-names }}\` — skipped auto-merge. Please review for breaking changes before merging manually." \
            || true

  rust:
    runs-on: ubuntu-latest
    needs: metadata
    if: github.actor == 'dependabot[bot]' && needs.metadata.outputs.update-type != 'version-update:semver-major'
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Build
        run: cargo check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-targets

  e2e:
    runs-on: ubuntu-latest
    needs: metadata
    if: github.actor == 'dependabot[bot]' && needs.metadata.outputs.update-type != 'version-update:semver-major'
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Start Qdrant
        run: |
          docker run -d --name shiori-qdrant-e2e \
            -p 6335:6335 \
            -e QDRANT__SERVICE__HTTP_PORT=6335 \
            -e QDRANT__SERVICE__GRPC_PORT=6336 \
            qdrant/qdrant
          until curl -fsS "http://127.0.0.1:6335/collections" >/dev/null; do
            sleep 1
          done

      - name: Run end-to-end test
        run: QDRANT_URL="http://127.0.0.1:6335" cargo test --test e2e end_to_end_search_flow -- --ignored --nocapture

  merge:
    runs-on: ubuntu-latest
    needs: [metadata, rust, e2e]
    if: github.actor == 'dependabot[bot]' && needs.metadata.outputs.update-type != 'version-update:semver-major'
    steps:
      - name: Approve and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr review --approve "$PR_URL" || true
          gh pr merge --auto --rebase "$PR_URL"
